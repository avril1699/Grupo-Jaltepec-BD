<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentaciones — Compañía de Danza</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container" id="main" style="display: none;">
    <div class="page-header">
      <h1>Presentaciones</h1>
      <button id="new-btn">+ Nueva presentación</button>
    </div>
    <div id="alert-container"></div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Fecha</th><th>Lugar</th><th>Cuadros</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2 id="modal-title">Nueva presentación</h2>
      <form id="form">
        <input type="hidden" id="f-id" />
        <div class="form-group"><label for="f-fecha">Fecha y hora</label>
          <input type="datetime-local" id="f-fecha" required /></div>
        <div class="form-group"><label for="f-lugar">Lugar</label>
          <input type="text" id="f-lugar" required maxlength="250" /></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancel-btn">Cancelar</button>
          <button type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module">
    import { requireAuth, logAudit, getSession } from '/js/auth.js';
    import { execSQL } from '/js/config.js';
    import { renderNavbar, formatDateTime, showAlert, openModal, closeModal } from '/js/ui.js';
    import { loadRows, deleteRow, esc } from '/js/crud.js';

    if (!requireAuth()) throw new Error('redirect');
    renderNavbar('presentaciones');
    document.getElementById('main').style.display = 'block';

    const tbody = document.getElementById('tbody');
    const alertC = document.getElementById('alert-container');

    async function reload() {
      const rows = await loadRows(`
        SELECT p.*, COUNT(c.id) AS num_cuadros
          FROM presentacion p
          LEFT JOIN cuadro c ON c.id_presentation = p.id
         GROUP BY p.id
         ORDER BY p.fecha DESC
      `, tbody, r => `
        <tr>
          <td>${r.id}</td>
          <td>${formatDateTime(r.fecha)}</td>
          <td>${r.lugar}</td>
          <td>${r.num_cuadros}</td>
          <td><div class="actions">
            <button class="btn-secondary btn-sm" data-edit="${r.id}">Editar</button>
            <button class="btn-danger btn-sm" data-del="${r.id}">Borrar</button>
          </div></td>
        </tr>
      `);
      window._rows = rows;
    }

    document.getElementById('new-btn').addEventListener('click', () => {
      document.getElementById('modal-title').textContent = 'Nueva presentación';
      document.getElementById('form').reset();
      document.getElementById('f-id').value = '';
      openModal('modal');
    });
    document.getElementById('cancel-btn').addEventListener('click', () => closeModal('modal'));

    tbody.addEventListener('click', async (e) => {
      const editId = e.target.dataset.edit;
      const delId  = e.target.dataset.del;
      if (editId) {
        const r = window._rows.find(x => x.id == editId);
        document.getElementById('modal-title').textContent = 'Editar presentación';
        document.getElementById('f-id').value = r.id;
        document.getElementById('f-fecha').value = r.fecha ? new Date(r.fecha).toISOString().slice(0, 16) : '';
        document.getElementById('f-lugar').value = r.lugar || '';
        openModal('modal');
      }
      if (delId) await deleteRow('presentacion', delId, reload, alertC);
    });

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id    = document.getElementById('f-id').value;
      const fecha = document.getElementById('f-fecha').value;
      const lugar = document.getElementById('f-lugar').value.trim();

      const sql = id
        ? `UPDATE presentacion SET fecha=${esc(fecha)}::timestamptz, lugar=${esc(lugar)}
            WHERE id=${esc(id)} RETURNING *`
        : `INSERT INTO presentacion (fecha, lugar)
            VALUES (${esc(fecha)}::timestamptz, ${esc(lugar)}) RETURNING *`;

      const { data, error } = await execSQL(sql);
      if (error) { showAlert(alertC, 'error', error); return; }
      const s = getSession();
      await logAudit(s.user.id, id ? 'UPDATE' : 'INSERT',
        { fecha, lugar }, 'presentacion', data && data[0] ? data[0].id : null);
      showAlert(alertC, 'success', id ? 'Presentación actualizada' : 'Presentación creada');
      closeModal('modal');
      await reload();
    });

    await reload();
  </script>
</body>
</html>
