<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Integrantes — Compañía de Danza</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container" id="main" style="display: none;">
    <div class="page-header">
      <h1>Integrantes</h1>
      <button id="new-btn">+ Nuevo integrante</button>
    </div>
    <div id="alert-container"></div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Nombre</th><th>Nacimiento</th><th>Ingreso</th><th>Obs. médicas</th><th></th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2 id="modal-title">Nuevo integrante</h2>
      <form id="form">
        <input type="hidden" id="f-id" />
        <div class="form-group"><label for="f-nombre">Nombre completo</label>
          <input type="text" id="f-nombre" required maxlength="250" /></div>
        <div class="form-group"><label for="f-nacimiento">Fecha de nacimiento</label>
          <input type="date" id="f-nacimiento" /></div>
        <div class="form-group"><label for="f-ingreso">Fecha de ingreso</label>
          <input type="date" id="f-ingreso" /></div>
        <div class="form-group"><label for="f-obs">Observaciones médicas</label>
          <textarea id="f-obs" rows="3"></textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancel-btn">Cancelar</button>
          <button type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module">
    import { requireAuth, logAudit, getSession } from '/js/auth.js';
    import { execSQL } from '/js/config.js';
    import { renderNavbar, formatDate, showAlert, openModal, closeModal } from '/js/ui.js';
    import { loadRows, deleteRow, esc } from '/js/crud.js';

    if (!requireAuth()) throw new Error('redirect');
    renderNavbar('integrantes');
    document.getElementById('main').style.display = 'block';

    const tbody = document.getElementById('tbody');
    const alertC = document.getElementById('alert-container');

    async function reload() {
      const rows = await loadRows(
        'SELECT * FROM integrante ORDER BY id ASC', tbody,
        r => `
          <tr>
            <td>${r.id}</td>
            <td>${r.nombre}</td>
            <td>${formatDate(r.fecha_nacimiento)}</td>
            <td>${formatDate(r.fecha_ingresso)}</td>
            <td>${r.observaciones_medicas ? r.observaciones_medicas.slice(0, 60) + (r.observaciones_medicas.length > 60 ? '…' : '') : '—'}</td>
            <td><div class="actions">
              <button class="btn-secondary btn-sm" data-edit="${r.id}">Editar</button>
              <button class="btn-danger btn-sm" data-del="${r.id}">Borrar</button>
            </div></td>
          </tr>
        `);
      window._rows = rows;
    }

    document.getElementById('new-btn').addEventListener('click', () => {
      document.getElementById('modal-title').textContent = 'Nuevo integrante';
      document.getElementById('form').reset();
      document.getElementById('f-id').value = '';
      openModal('modal');
    });
    document.getElementById('cancel-btn').addEventListener('click', () => closeModal('modal'));

    tbody.addEventListener('click', async (e) => {
      const editId = e.target.dataset.edit;
      const delId  = e.target.dataset.del;
      if (editId) {
        const r = window._rows.find(x => x.id == editId);
        document.getElementById('modal-title').textContent = 'Editar integrante';
        document.getElementById('f-id').value = r.id;
        document.getElementById('f-nombre').value = r.nombre || '';
        document.getElementById('f-nacimiento').value = r.fecha_nacimiento || '';
        document.getElementById('f-ingreso').value = r.fecha_ingresso || '';
        document.getElementById('f-obs').value = r.observaciones_medicas || '';
        openModal('modal');
      }
      if (delId) await deleteRow('integrante', delId, reload, alertC);
    });

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('f-id').value;
      const nombre = document.getElementById('f-nombre').value.trim();
      const nac = document.getElementById('f-nacimiento').value || null;
      const ing = document.getElementById('f-ingreso').value || null;
      const obs = document.getElementById('f-obs').value.trim() || null;

      const sql = id
        ? `UPDATE integrante SET nombre=${esc(nombre)}, fecha_nacimiento=${esc(nac)},
                  fecha_ingresso=${esc(ing)}, observaciones_medicas=${esc(obs)}
            WHERE id=${esc(id)} RETURNING *`
        : `INSERT INTO integrante (nombre, fecha_nacimiento, fecha_ingresso, observaciones_medicas)
            VALUES (${esc(nombre)}, ${esc(nac)}, ${esc(ing)}, ${esc(obs)}) RETURNING *`;

      const { data, error } = await execSQL(sql);
      if (error) { showAlert(alertC, 'error', error); return; }
      const s = getSession();
      await logAudit(s.user.id, id ? 'UPDATE' : 'INSERT',
        { nombre, fecha_ingresso: ing }, 'integrante', data && data[0] ? data[0].id : null);
      showAlert(alertC, 'success', id ? 'Integrante actualizado' : 'Integrante creado');
      closeModal('modal');
      await reload();
    });

    await reload();
  </script>
</body>
</html>
