<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio — Grupo Jaltepec</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>
  <div class="container" id="main" style="display: none;">
    <div class="page-header"><h1>Resumen general</h1></div>
    <div class="kpi-grid" id="kpis"></div>
    <div class="dashboard-grid" id="stats"></div>
    <div class="card">
      <h2>📅Próximas presentaciones</h2>
      
      <div class="table-wrap">
        <table>
          <thead><tr><th>Fecha</th><th>Lugar</th><th>Cuadros</th></tr></thead>
          <tbody id="proximas-tbody"></tbody>
        </table>
      </div>
    </div>

<div class="card">
  <h2>Control de asistencia</h2>
<div id="asistencia-form-container"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Integrante</th>
          <th>Asistencias</th>
          <th>Faltas</th>
          <th>%</th>
        </tr>
      </thead>

      <tbody id="asistencia-tbody"></tbody>
    </table>
  </div>
</div>
<div class="card">
  <h2>Inventario disponible</h2>
  <canvas id="chartInventario"></canvas>
</div>

<div
  class="card"
  id="mis-observaciones-card"
  style="display:none;"
>
  <h2>Mis observaciones</h2>

  <table id="tabla-observaciones">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Asistencia</th>
        <th>Observación</th>
      </tr>
    </thead>
<tbody id="mis-observaciones"></tbody>
  </table>
</div>

    <div class="card">
      <h2>Última actividad</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Cuándo</th><th>Usuario</th><th>Acción</th><th>Tabla</th></tr></thead>
          <tbody id="audit-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script type="module">
    import { requireAuth, getSession } from '/js/auth.js';
    import { execSQL } from '/js/config.js';
    import { renderNavbar, formatDateTime } from '/js/ui.js';

    if (!requireAuth()) throw new Error('redirect');
    renderNavbar('dashboard');
    document.getElementById('main').style.display = 'block';

    const stats = document.getElementById('stats');
    const kpis = document.getElementById('kpis');

    const session = getSession();
    if (session.user.rol === 'admin') {

  const { data: integrantes } =
    await execSQL(`
      SELECT id,nombre
      FROM integrante
      ORDER BY nombre
    `);

  const cont =
    document.getElementById(
      'asistencia-form-container'
    );

  cont.innerHTML = `
    <div class="card" style="margin-bottom:20px;">
      <h3>Registrar asistencia</h3>

      <select id="asis-integrante">
  ${integrantes.map(i => `
    <option value="${i.id}">
      ${i.nombre}
    </option>
  `).join('')}
</select>

<input type="date" id="asis-fecha">

<select id="asis-estado">
  <option value="true">Asistió</option>
  <option value="false">Faltó</option>
</select>

<textarea
  id="asis-observacion"
  placeholder="Observaciones..."
  rows="3"
></textarea>

<button id="guardar-asistencia">
  Guardar
</button>
    </div>
  `;
}
document.addEventListener(
  'click',
  async e => {

    if (
      e.target.id ===
      'guardar-asistencia'
    ) {
      const observacion =
         document.getElementById(
           'asis-observacion'
         ).value.trim();

      const integrante =
        document.getElementById(
          'asis-integrante'
        ).value;

      const fecha =
        document.getElementById(
          'asis-fecha'
        ).value;

      const asistio =
        document.getElementById(
          'asis-estado'
        ).value;

      const res = await execSQL(`
        INSERT INTO asistencia(
          id_integrante,
          fecha,
          asistio,
          observacion
        )
        VALUES(
          ${integrante},
          '${fecha}',
          ${asistio},
         '${observacion.replace(/'/g,"''")}'
        )
      `);

      if (!res.error) {
        alert(
          'Asistencia registrada'
        );

        location.reload();
      } else {
        alert(res.error);
      }
    }
  }
);
    const queries = [
  { label: 'Total Integrantes', sql: 'SELECT COUNT(*) AS n FROM integrante' },
  { label: 'Total Bailes', sql: 'SELECT COUNT(*) AS n FROM baile' },
  { label: 'Total Presentaciones', sql: 'SELECT COUNT(*) AS n FROM presentacion' },
  { label: 'Total Cuadros', sql: 'SELECT COUNT(*) AS n FROM cuadro' },
  {
    label: 'Inventario Total',
    sql: 'SELECT COALESCE(SUM(cantidad_total),0) AS n FROM inventario'
  }
];
    for (const q of queries) {
      const { data } = await execSQL(q.sql);
      const value = data && data[0] ? data[0].n : '?';
      stats.insertAdjacentHTML('beforeend', `
        <div class="stat-card">
          <div class="label">${q.label}</div>
          <div class="value">${value}</div>
        </div>
      `);
    }

    const proximas = await execSQL(`
      SELECT p.id, p.fecha, p.lugar, COUNT(c.id) AS num_cuadros
        FROM presentacion p
        LEFT JOIN cuadro c ON c.id_presentation = p.id
       WHERE p.fecha >= NOW()
       GROUP BY p.id
       ORDER BY p.fecha ASC
       LIMIT 5
    `);
    const proxTbody = document.getElementById('proximas-tbody');
    if (proximas.data && proximas.data.length > 0) {
      proximas.data.forEach(p => proxTbody.insertAdjacentHTML('beforeend', `
        <tr><td>${formatDateTime(p.fecha)}</td><td>${p.lugar}</td><td>${p.num_cuadros}</td></tr>
      `));
    } else {
      proxTbody.innerHTML = '<tr><td colspan="3" class="empty">No hay presentaciones futuras</td></tr>';
    }
    if (proximas.data?.length) {

  const prox = proximas.data[0];

  const dias = Math.ceil(
    (new Date(prox.fecha) - new Date())
    / (1000 * 60 * 60 * 24)
  );

  kpis.insertAdjacentHTML(
    'beforeend',
    `
    <div class="stat-card">
      <div class="label">
        📅 Próxima presentación
      </div>

      <div class="value">
        ${dias} días
      </div>

      <small>${prox.lugar}</small>
    </div>
    `
  );
}
if (
  session.user.rol === 'integrante'
  && session.user.id_integrante
) {

  document
    .getElementById('mis-observaciones-card')
    .style.display = 'block';

  const obs = await execSQL(`
    SELECT
      fecha,
      asistio,
      observacion
    FROM asistencia
    WHERE id_integrante =
      ${session.user.id_integrante}
    ORDER BY fecha DESC
  `);

  const tbody =
    document.getElementById(
      'mis-observaciones'
    );

  if (obs.data) {

    obs.data.forEach(r => {

      tbody.insertAdjacentHTML(
        'beforeend',
        `
        <tr>
          <td>${formatDateTime(r.fecha)}</td>
          <td>
            ${
              r.asistio
                ? 'Asistió'
                : 'Faltó'
            }
          </td>
          <td>
            ${r.observacion || ''}
          </td>
        </tr>
        `
      );

    });

  }

}
    const audit = await execSQL(`
      SELECT a.created_at, a.accion, a.tabla_afectada, u.email
        FROM audit_log a
        LEFT JOIN usuario u ON u.id = a.id_usuario
       ORDER BY a.created_at DESC
       LIMIT 10
    `);
    const auditTbody = document.getElementById('audit-tbody');
    if (audit.data && audit.data.length > 0) {
      audit.data.forEach(a => auditTbody.insertAdjacentHTML('beforeend', `
        <tr>
          <td>${formatDateTime(a.created_at)}</td>
          <td>${a.email || '—'}</td>
          <td>${a.accion}</td>
          <td>${a.tabla_afectada || '—'}</td>
        </tr>
      `));
    } else {
      auditTbody.innerHTML = '<tr><td colspan="4" class="empty">Sin actividad reciente</td></tr>';
    }
    try {

const asistencia = await execSQL(`
SELECT
i.nombre,
SUM(CASE WHEN a.asistio THEN 1 ELSE 0 END) asistencias,
SUM(CASE WHEN a.asistio THEN 0 ELSE 1 END) faltas,
ROUND(
100.0 *
SUM(CASE WHEN a.asistio THEN 1 ELSE 0 END)
/ NULLIF(COUNT(*),0),
2
) porcentaje
FROM asistencia a
JOIN integrante i
ON i.id = a.id_integrante
GROUP BY i.nombre
ORDER BY porcentaje DESC
`);

const asistenciaTbody =
document.getElementById('asistencia-tbody');

if (asistencia.data) {
  asistencia.data.forEach(r => {

    asistenciaTbody.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${r.nombre}</td>
        <td>${r.asistencias}</td>
        <td>${r.faltas}</td>
        <td>
<span class="${
Number(r.porcentaje) >= 85
? 'badge-success'
: Number(r.porcentaje) < 70
? 'badge-danger'
: 'badge-warning'
}">
${r.porcentaje}%
</span>
</td>
      </tr>
    `);

  });
}
const promedio = await execSQL(`
SELECT
ROUND(
AVG(
CASE
WHEN asistio THEN 100
ELSE 0
END
),2
) promedio
FROM asistencia
`);

const p =
promedio.data?.[0]?.promedio || 0;

kpis.insertAdjacentHTML(
'beforeend',
`
<div class="stat-card">
<div class="label">
👥 Asistencia promedio
</div>

<div class="value">
${p}%
</div>
</div>
`
);

} catch(e) {
  console.log('Tabla asistencia no encontrada');
}
try {

const part = await execSQL(`
SELECT
i.nombre,
COUNT(*) AS total
FROM participa_en p
JOIN integrante i
ON i.id = p.id_integrante
GROUP BY i.nombre
ORDER BY total DESC
LIMIT 10
`);

new Chart(
document.getElementById('chartParticipaciones'),
{
  type:'bar',
  data:{
    labels: part.map(x => x.nombre),
    datasets:[{
      label:'Participaciones',
      data: part.data.map(x => x.total)
    }]
  }
});

} catch(e) {
  console.log(e);
}
const critico = await execSQL(`
SELECT COUNT(*) AS total
FROM inventario
WHERE cantidad_total < 5
`);

kpis.insertAdjacentHTML(
'beforeend',
`
<div class="stat-card">
  <div class="label">
    📦 Inventario crítico
  </div>

  <div class="value">
    ${critico.data[0].total}
  </div>
</div>
`
);
try {

const inv = await execSQL(`
SELECT
nombre,
cantidad_total
FROM inventario
ORDER BY cantidad_total DESC
LIMIT 10
`);

new Chart(
document.getElementById('chartInventario'),
{
  type:'pie',
  data:{
    labels:inv.data.map(x => x.nombre),
    datasets:[{
      data:inv.data.map(x => x.cantidad_total)
    }]
  }
});

} catch(e) {
  console.log(e);
}
  </script>
</body>
</html>
