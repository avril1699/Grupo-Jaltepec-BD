<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio — Grupo Jaltepec</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>
  <div class="container" id="main" style="display: none;">
    <div class="page-header"><h1>Resumen general</h1></div>
    <div class="dashboard-grid" id="stats"></div>
    <div class="card">
      <h2>Próximas presentaciones</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Fecha</th><th>Lugar</th><th>Cuadros</th></tr></thead>
          <tbody id="proximas-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
  <h2>Participaciones por integrante</h2>
  <canvas id="chartParticipaciones"></canvas>
</div>

<div class="card">
  <h2>Inventario disponible</h2>
  <canvas id="chartInventario"></canvas>
</div>

<div class="card">
  <h2>Presentaciones por año</h2>
  <canvas id="chartPresentaciones"></canvas>
</div>

<div class="card">
  <h2>Control de asistencia</h2>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Integrante</th>
          <th>Asistencias</th>
          <th>Faltas</th>
          <th>%</th>
        </tr>
      </thead>

      <tbody id="asistencia-tbody"></tbody>
    </table>
  </div>
</div>

    <div class="card">
      <h2>Última actividad</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Cuándo</th><th>Usuario</th><th>Acción</th><th>Tabla</th></tr></thead>
          <tbody id="audit-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script type="module">
    import { requireAuth } from '/js/auth.js';
    import { execSQL } from '/js/config.js';
    import { renderNavbar, formatDateTime } from '/js/ui.js';

    if (!requireAuth()) throw new Error('redirect');
    renderNavbar('dashboard');
    document.getElementById('main').style.display = 'block';

    const stats = document.getElementById('stats');
    const queries = [
  { label: 'Total Integrantes', sql: 'SELECT COUNT(*) AS n FROM integrante' },
  { label: 'Total Bailes', sql: 'SELECT COUNT(*) AS n FROM baile' },
  { label: 'Total Presentaciones', sql: 'SELECT COUNT(*) AS n FROM presentacion' },
  { label: 'Total Cuadros', sql: 'SELECT COUNT(*) AS n FROM cuadro' },
  {
    label: 'Inventario Total',
    sql: 'SELECT COALESCE(SUM(cantidad_total),0) AS n FROM inventario'
  }
];
    for (const q of queries) {
      const { data } = await execSQL(q.sql);
      const value = data && data[0] ? data[0].n : '?';
      stats.insertAdjacentHTML('beforeend', `
        <div class="stat-card">
          <div class="label">${q.label}</div>
          <div class="value">${value}</div>
        </div>
      `);
    }

    const proximas = await execSQL(`
      SELECT p.id, p.fecha, p.lugar, COUNT(c.id) AS num_cuadros
        FROM presentacion p
        LEFT JOIN cuadro c ON c.id_presentation = p.id
       WHERE p.fecha >= NOW()
       GROUP BY p.id
       ORDER BY p.fecha ASC
       LIMIT 5
    `);
    const proxTbody = document.getElementById('proximas-tbody');
    if (proximas.data && proximas.data.length > 0) {
      proximas.data.forEach(p => proxTbody.insertAdjacentHTML('beforeend', `
        <tr><td>${formatDateTime(p.fecha)}</td><td>${p.lugar}</td><td>${p.num_cuadros}</td></tr>
      `));
    } else {
      proxTbody.innerHTML = '<tr><td colspan="3" class="empty">No hay presentaciones futuras</td></tr>';
    }

    const audit = await execSQL(`
      SELECT a.created_at, a.accion, a.tabla_afectada, u.email
        FROM audit_log a
        LEFT JOIN usuario u ON u.id = a.id_usuario
       ORDER BY a.created_at DESC
       LIMIT 10
    `);
    const auditTbody = document.getElementById('audit-tbody');
    if (audit.data && audit.data.length > 0) {
      audit.data.forEach(a => auditTbody.insertAdjacentHTML('beforeend', `
        <tr>
          <td>${formatDateTime(a.created_at)}</td>
          <td>${a.email || '—'}</td>
          <td>${a.accion}</td>
          <td>${a.tabla_afectada || '—'}</td>
        </tr>
      `));
    } else {
      auditTbody.innerHTML = '<tr><td colspan="4" class="empty">Sin actividad reciente</td></tr>';
    }
    try {

const asistencia = await execSQL(`
SELECT
i.nombre,
SUM(CASE WHEN a.asistio THEN 1 ELSE 0 END) asistencias,
SUM(CASE WHEN a.asistio THEN 0 ELSE 1 END) faltas,
ROUND(
100.0 *
SUM(CASE WHEN a.asistio THEN 1 ELSE 0 END)
/ NULLIF(COUNT(*),0),
2
) porcentaje
FROM asistencia a
JOIN integrante i
ON i.id = a.id_integrante
GROUP BY i.nombre
ORDER BY porcentaje DESC
`);

const asistenciaTbody =
document.getElementById('asistencia-tbody');

if (asistencia.data) {
  asistencia.data.forEach(r => {

    asistenciaTbody.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${r.nombre}</td>
        <td>${r.asistencias}</td>
        <td>${r.faltas}</td>
        <td>${r.porcentaje}%</td>
      </tr>
    `);

  });
}

} catch(e) {
  console.log('Tabla asistencia no encontrada');
}
try {

const part = await execSQL(`
SELECT
i.nombre,
COUNT(*) total
FROM participacion p
JOIN integrante i
ON i.id = p.id_integrante
GROUP BY i.nombre
ORDER BY total DESC
LIMIT 10
`);

new Chart(
document.getElementById('chartInventario'),
{
  type:'bar',
  data:{
    labels:inv.data.map(x => x.nombre),
    datasets:[{
      label:'Usos',
      data:inv.data.map(x => x.total)
    }]
  }
});

} catch(e) {
  console.log(e);
}
try {

const inv = await execSQL(`
SELECT
nombre,
cantidad_total
FROM inventario
ORDER BY cantidad_total DESC
LIMIT 10
`);

new Chart(
document.getElementById('chartInventario'),
{
  type:'pie',
  data:{
    labels:inv.data.map(x => x.nombre),
    datasets:[{
      data:inv.data.map(x => x.cantidad_total)
    }]
  }
});

} catch(e) {
  console.log(e);
}
try {

const pres = await execSQL(`
SELECT
EXTRACT(YEAR FROM fecha) anio,
COUNT(*) total
FROM presentacion
GROUP BY anio
ORDER BY anio
`);

new Chart(
document.getElementById('chartPresentaciones'),
{
  type:'line',
  data:{
    labels:pres.data.map(x => x.anio),
    datasets:[{
      label:'Presentaciones',
      data:pres.data.map(x => x.total)
    }]
  }
});

} catch(e) {
  console.log(e);
}
  </script>
</body>
</html>
