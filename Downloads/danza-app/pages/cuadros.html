<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuadros — Compañía de Danza</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container" id="main" style="display: none;">
    <div class="page-header">
      <h1>Cuadros</h1>
      <button id="new-btn">+ Nuevo cuadro</button>
    </div>
    <div id="alert-container"></div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Nombre</th><th>Baile</th><th>Presentación</th><th>Parejas</th><th></th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2 id="modal-title">Nuevo cuadro</h2>
      <form id="form">
        <input type="hidden" id="f-id" />
        <div class="form-group"><label for="f-nombre">Nombre del cuadro</label>
          <input type="text" id="f-nombre" required maxlength="250" /></div>
        <div class="form-group"><label for="f-baile">Baile</label>
          <select id="f-baile" required></select></div>
        <div class="form-group"><label for="f-presentacion">Presentación (opcional)</label>
          <select id="f-presentacion"><option value="">— Sin asignar —</option></select></div>
        <div class="form-group"><label for="f-parejas">Número de parejas</label>
          <input type="number" id="f-parejas" min="0" value="0" /></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancel-btn">Cancelar</button>
          <button type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module">
    import { requireAuth, logAudit, getSession } from '/js/auth.js';
    import { execSQL } from '/js/config.js';
    import { renderNavbar, formatDateTime, showAlert, openModal, closeModal } from '/js/ui.js';
    import { loadRows, deleteRow, esc } from '/js/crud.js';

    if (!requireAuth()) throw new Error('redirect');

renderNavbar('cuadros');

const session = getSession();

const esAdmin =
  session?.user?.rol === 'usuario' ||
  session?.user?.rol === 'admin';

document.getElementById('main').style.display = 'block';

if (!esAdmin) {
  document.getElementById('new-btn').style.display = 'none';
}
    const tbody = document.getElementById('tbody');
    const alertC = document.getElementById('alert-container');

    async function loadDropdowns() {
      const { data: bailes } = await execSQL('SELECT id, nombre FROM baile ORDER BY nombre');
      const { data: pres }   = await execSQL('SELECT id, fecha, lugar FROM presentacion ORDER BY fecha DESC');

      const sb = document.getElementById('f-baile');
      sb.innerHTML = '<option value="">— Elige un baile —</option>';
      (bailes || []).forEach(b => sb.insertAdjacentHTML('beforeend',
        `<option value="${b.id}">${b.nombre}</option>`));

      const sp = document.getElementById('f-presentacion');
      sp.innerHTML = '<option value="">— Sin asignar —</option>';
      (pres || []).forEach(p => sp.insertAdjacentHTML('beforeend',
        `<option value="${p.id}">${new Date(p.fecha).toLocaleDateString('es-PE')} · ${p.lugar}</option>`));
    }

    async function reload() {
      const rows = await loadRows(`
        SELECT c.*, b.nombre AS baile_nombre,
               p.fecha AS pres_fecha, p.lugar AS pres_lugar
          FROM cuadro c
          JOIN baile b ON b.id = c.id_baile
          LEFT JOIN presentacion p ON p.id = c.id_presentation
         ORDER BY c.id ASC
      `, tbody, r => `
        <tr>
          <td>${r.id}</td>
          <td>${r.nombre}</td>
          <td>${r.baile_nombre}</td>
          <td>${r.pres_fecha ? formatDateTime(r.pres_fecha) + ' · ' + r.pres_lugar : '—'}</td>
          <td>${r.numero_parejas}</td>
          <td>
  ${
    esAdmin
      ? `
      <div class="actions">
        <button class="btn-secondary btn-sm" data-edit="1">Editar</button>
        <button class="btn-danger btn-sm" data-del="1">Borrar</button>
      </div>
      `
      : ''
  }
</td>
        </tr>
      `);
      window._rows = rows;
    }

    document.getElementById('new-btn').addEventListener('click', () => {
      document.getElementById('modal-title').textContent = 'Nuevo cuadro';
      document.getElementById('form').reset();
      document.getElementById('f-id').value = '';
      openModal('modal');
    });
    document.getElementById('cancel-btn').addEventListener('click', () => closeModal('modal'));

    tbody.addEventListener('click', async (e) => {
      const editId = e.target.dataset.edit;
      const delId  = e.target.dataset.del;
      if (editId) {
        const r = window._rows.find(x => x.id == editId);
        document.getElementById('modal-title').textContent = 'Editar cuadro';
        document.getElementById('f-id').value = r.id;
        document.getElementById('f-nombre').value = r.nombre || '';
        document.getElementById('f-baile').value = r.id_baile || '';
        document.getElementById('f-presentacion').value = r.id_presentation || '';
        document.getElementById('f-parejas').value = r.numero_parejas || 0;
        openModal('modal');
      }
      if (delId) await deleteRow('cuadro', delId, reload, alertC);
    });

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id      = document.getElementById('f-id').value;
      const nombre  = document.getElementById('f-nombre').value.trim();
      const baile   = document.getElementById('f-baile').value;
      const pres    = document.getElementById('f-presentacion').value || null;
      const parejas = parseInt(document.getElementById('f-parejas').value) || 0;

      const sql = id
        ? `UPDATE cuadro SET nombre=${esc(nombre)}, id_baile=${esc(baile)},
                  id_presentation=${esc(pres)}, numero_parejas=${parejas}
            WHERE id=${esc(id)} RETURNING *`
        : `INSERT INTO cuadro (nombre, id_baile, id_presentation, numero_parejas)
            VALUES (${esc(nombre)}, ${esc(baile)}, ${esc(pres)}, ${parejas}) RETURNING *`;

      const { data, error } = await execSQL(sql);
      if (error) { showAlert(alertC, 'error', error); return; }
      const s = getSession();
      await logAudit(s.user.id, id ? 'UPDATE' : 'INSERT',
        { nombre, id_baile: baile, id_presentation: pres, numero_parejas: parejas },
        'cuadro', data && data[0] ? data[0].id : null);
      showAlert(alertC, 'success', id ? 'Cuadro actualizado' : 'Cuadro creado');
      closeModal('modal');
      await reload();
    });

    await loadDropdowns();
    await reload();
  </script>
</body>
</html>
