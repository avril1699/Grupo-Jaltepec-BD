<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grupo Jaltepec</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <body>

<div class="login-page">

    <div class="left-panel"></div>
        
    <div class="right-panel">

    <div class="login-card">

        <div class="logo-content">
            <h1>Grupo Jaltepec</h1>
            <p>Sistema de Administración</p>
        </div>

        <div class="avatar">
            <img src="/Imagen/avatar.png" alt="Avatar">
        </div>

        <div id="alert-container"></div>

        <form id="login-form">

            <div class="input-group">
                <input
                    type="email"
                    id="email"
                    placeholder="Correo electrónico"
                    required>
            </div>

            <div class="input-group">
                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña"
                    required>
            </div>

            <button type="submit" id="submit-btn">
                Iniciar sesión
            </button>

        </form>

    </div>

</div>
<script type="module">
import { login, getSession } from '/js/auth.js';
import { showAlert } from '/js/ui.js';

if (getSession()) {
  window.location.href = '/pages/dashboard.html';
}

const form = document.getElementById('login-form');
const alertC = document.getElementById('alert-container');
const btn = document.getElementById('submit-btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  btn.disabled = true;
  btn.textContent = 'Ingresando...';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const result = await login(email, password);

  if (result.ok) {
    window.location.href = '/pages/dashboard.html';
  } else {
    showAlert(alertC, 'error', result.error);
    btn.disabled = false;
    btn.textContent = 'LOGIN';
  }
});
</script>

</body>
</html>
