<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Grupo Jaltepec</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <div class="form-body">
    <img src="Imagen/WhatsApp Image 2026-05-27 at 13.27.44.jpeg" alt="login-container">

  </div>

  <div class="login-container">
    <h1>Bienvenido a Grupo Jaltepec</h1>
    <p class="subtitle">Sistema de administración</p>
    <div class="card">
      <h2>Iniciar sesión</h2>
      <div id="alert-container"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" required autocomplete="email" placeholder="admin@compania.pe" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" id="submit-btn" style="width: 100%; justify-content: center;">Ingresar</button>
      </form>
    </div>
  </div>
  <script type="module">
    import { login, getSession } from '/js/auth.js';
    import { showAlert } from '/js/ui.js';
    if (getSession()) window.location.href = '/pages/dashboard.html';
    const form = document.getElementById('login-form');
    const alertC = document.getElementById('alert-container');
    const btn = document.getElementById('submit-btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const result = await login(email, password);
      if (result.ok) {
        window.location.href = '/pages/dashboard.html';
      } else {
        showAlert(alertC, 'error', result.error);
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
